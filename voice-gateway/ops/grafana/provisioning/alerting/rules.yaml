        labels:
          severity: P2
          service: voice-gateway
          device_id: xiaoai-speaker
        annotations:
          summary: "TTS generation is failing repeatedly."
          runbook_url: "voice-gateway/docs/4-ops/07-ops-runbook.md#4-tts-生成失败"
        data:
