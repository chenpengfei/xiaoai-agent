        labels:
          severity: P1
          service: voice-gateway
          device_id: xiaoai-speaker
        annotations:
          summary: "A runtime worker failed."
          runbook_url: "voice-gateway/docs/4-ops/07-ops-runbook.md"
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: "sum(increase(voice_gateway_runtime_worker_failure_total[5m])) or vector(0)"
              instant: true
