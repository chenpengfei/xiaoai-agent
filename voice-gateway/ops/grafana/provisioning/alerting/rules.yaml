apiVersion: 1

groups:
  - orgId: 1
    name: voice-gateway
    folder: Voice Gateway
    interval: 1m
    rules:
      - uid: voice-gateway-down
        title: Voice Gateway down
        condition: C
        noDataState: OK
        for: 1m
        labels:
          severity: P1
          service: voice-gateway
          device_id: xiaoai-speaker
        annotations:
          summary: "voice-gateway metrics are absent."
          runbook_url: "voice-gateway/docs/4-ops/07-ops-runbook.md#1-voice-gateway-进程不可用"
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: "absent(voice_gateway_up)"
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query

      - uid: voice-gateway-audio-stale
        title: Voice Gateway audio stream stale
        condition: C
        noDataState: OK
        for: 2m
        labels:
          severity: P1
          service: voice-gateway
          device_id: xiaoai-speaker
        annotations:
          summary: "Audio stream has not advanced recently."
          runbook_url: "voice-gateway/docs/4-ops/07-ops-runbook.md#2-音频流中断"
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: "(voice_gateway_audio_chunk_total > bool 0) * (voice_gateway_audio_last_seen_age_seconds > bool 120)"
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query

