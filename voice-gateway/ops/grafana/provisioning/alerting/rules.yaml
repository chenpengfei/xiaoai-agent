            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: A
              expr: "increase(voice_gateway_tts_failure_total[10m])"
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query

      - uid: voice-gateway-playback-failures
        title: Voice Gateway playback failures
        condition: C
        for: 1m
        labels:
          severity: P2
          service: voice-gateway
          device_id: xiaoai-speaker
        annotations:
          summary: "Playback commands are failing repeatedly."
          runbook_url: "voice-gateway/docs/4-ops/07-ops-runbook.md#5-播放失败"
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: A
              expr: "increase(voice_gateway_playback_failure_total[10m])"
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query

      - uid: voice-gateway-turn-slow
        title: Voice Gateway turn latency high
        condition: C
        for: 3m
        labels:
          severity: P2
          service: voice-gateway
          device_id: xiaoai-speaker
        annotations:
          summary: "Voice turn p95 latency is above 15 seconds."
          runbook_url: "voice-gateway/docs/4-ops/07-ops-runbook.md"
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              refId: A
              expr: "voice_gateway_turn_duration_ms{quantile=\"0.95\"}"
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 900
              to: 0
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 900
              to: 0
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params: [15000]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query

      - uid: voice-gateway-hermes-slow
        title: Voice Gateway Hermes latency high
        condition: C
        for: 3m
        labels:
          severity: P2
          service: voice-gateway
          device_id: xiaoai-speaker
        annotations:
          summary: "Hermes p95 latency is above 10 seconds."
          runbook_url: "voice-gateway/docs/4-ops/07-ops-runbook.md#3-hermes-持续失败"
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 900
              to: 0
            model:
              refId: A
              expr: "voice_gateway_turn_stage_duration_ms{stage=\"hermes\",quantile=\"0.95\"}"
              instant: true
              range: false
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 900
              to: 0
            model:
              refId: B
