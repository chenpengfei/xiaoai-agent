        labels:
          severity: P2
          service: voice-gateway
          device_id: xiaoai-speaker
        annotations:
          summary: "Structured event log has not advanced recently."
          runbook_url: "voice-gateway/docs/4-ops/07-ops-runbook.md"
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: "voice_gateway_events_total > 0 and voice_gateway_event_log_last_write_age_seconds > 120"
